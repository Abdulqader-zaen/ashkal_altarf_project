<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1b1e21" />
      <stop offset="70%" stop-color="#121417" />
      <stop offset="100%" stop-color="#090a0c" />
    </radialGradient>

    <linearGradient id="gold-metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdfaed" /> <stop offset="25%" stop-color="#e8c783" />
      <stop offset="50%" stop-color="#d4aa5d" /> <stop offset="75%" stop-color="#ba9147" />
      <stop offset="100%" stop-color="#a07a34" /> </linearGradient>

    <filter id="luxury-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.8" />
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg-grad)" />

  <g filter="url(#luxury-shadow)" transform="translate(0, -10)">
    
    <g transform="translate(400, 245)">
      <path d="M -4 100 L 4 100 L 4 -100 L -4 -100 Z" fill="url(#gold-metal)" /> <path d="M -5 100 L -65 100 L -120 -60 L -115 -80 L -65 80 L -5 80 Z" fill="url(#gold-metal)" /> <path d="M 5 100 L 65 100 L 120 -60 L 115 -80 L 65 80 L 5 80 Z" fill="url(#gold-metal)" /> <path d="M -70 10 L 70 10 L 120 10 L 120 -10 L 70 -10 Z" fill="url(#gold-metal)" /> <path d="M -120 10 L -70 10 L -70 -10 L -120 -10 Z" fill="url(#gold-metal)" /> <path d="M -125 -65 L -105 -65 L -105 -50 Z" fill="url(#gold-metal)" /> <path d="M 125 -65 L 105 -65 L 105 -50 Z" fill="url(#gold-metal)" /> <path d="M -75 -100 L -55 -100 L -55 -85 L -75 -85 Z" fill="url(#gold-metal)" /> <path d="M 75 -100 L 55 -100 L 55 -85 L 75 -85 Z" fill="url(#gold-metal)" /> </g>

    <g text-anchor="middle">
      <text x="400" y="475" 
            font-family="Arial, 'Cairo', 'Dubai', sans-serif" 
            font-size="44" 
            font-weight="900" 
            letter-spacing="1.5"
            fill="url(#gold-metal)">
        أشـكـال الـتـرف
      </text>

      <text x="400" y="515" 
            font-family="'Montserrat', 'Helvetica Neue', sans-serif" 
            font-size="18" 
            font-weight="700" 
            letter-spacing="8" 
            fill="url(#gold-metal)">
        ASHKAL AL-TARAF
      </text>

      <text x="400" y="540" 
            font-family="'Montserrat', 'Helvetica Neue', sans-serif" 
            font-size="11" 
            font-weight="500" 
            letter-spacing="11" 
            fill="#a3a8ae">
        STEEL &amp; LUXURY
      </text>
    </g>
  </g>

</svg>
