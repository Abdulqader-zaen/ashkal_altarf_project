<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg">
<title>أشكال الترف للحديد الصناعي</title>
<defs>
  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#e8c97a"/>
    <stop offset="50%"  stop-color="#c9a84c"/>
    <stop offset="100%" stop-color="#e8c97a"/>
  </linearGradient>
</defs>

<!-- الاسم الرئيسي بالخط الديواني – ذهبي -->
<text
  x="340" y="155"
  text-anchor="middle"
  font-family="'Scheherazade New', 'Amiri', serif"
  font-size="98"
  font-weight="700"
  fill="url(#goldGrad)"
  letter-spacing="-1">أشكال الترف</text>

<!-- السطر الثاني – فضي ناعم -->
<text
  x="340" y="238"
  text-anchor="middle"
  font-family="'Amiri', serif"
  font-size="46"
  font-weight="400"
  fill="#a0aab8"
  letter-spacing="2">للحديد الصناعي</text>

</svg>
