<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg">
<title>أشكال الترف للحديد الصناعي</title>
<defs>
  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#e8c97a"/>
    <stop offset="50%"  stop-color="#c9a84c"/>
    <stop offset="100%" stop-color="#e8c97a"/>
  </linearGradient>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700&amp;display=swap');
    .brand-main { font-family: "Neue Haas Grotesk Arabic", "IBM Plex Sans Arabic", sans-serif; font-weight: 700; }
    .brand-sub  { font-family: "Neue Haas Grotesk Arabic", "IBM Plex Sans Arabic", sans-serif; font-weight: 400; }
  </style>
</defs>

<!-- الاسم الرئيسي – ذهبي -->
<text
  x="340" y="160"
  text-anchor="middle"
  class="brand-main"
  font-size="92"
  fill="url(#goldGrad)"
  letter-spacing="-1">أشكال الترف</text>

<!-- السطر الثاني – فضي ناعم -->
<text
  x="340" y="232"
  text-anchor="middle"
  class="brand-sub"
  font-size="42"
  fill="#a0aab8"
  letter-spacing="2">للحديد الصناعي</text>

</svg>
