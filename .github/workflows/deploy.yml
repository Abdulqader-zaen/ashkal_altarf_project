name: Deploy to Hostinger

on:
  push:
    branches:
      - main   # يشتغل تلقائياً كل ما تعمل push على main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. رفع الملفات على Hostinger عبر FTP
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./          # رفع كل الملفات من المشروع
          server-dir: /public_html/  # المجلد على Hostinger
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
